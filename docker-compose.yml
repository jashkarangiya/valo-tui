services:
  worker:
    build: .
    command: python worker/fetcher.py
    environment:
      VALO_TUI_DB: /var/lib/valo-tui/cache.db
    volumes: ["valo-tui-data:/var/lib/valo-tui"]
    restart: unless-stopped

  web:
    build: .
    command: python serve/web.py
    environment:
      VALO_TUI_DB: /var/lib/valo-tui/cache.db
    expose: ["8000"]
    volumes: ["valo-tui-data:/var/lib/valo-tui"]
    depends_on: [worker]
    restart: unless-stopped

  ssh:
    build: .
    command: python serve/ssh.py
    environment:
      VALO_TUI_DB: /var/lib/valo-tui/cache.db
    ports: ["2222:2222"]
    volumes:
      - "valo-tui-data:/var/lib/valo-tui"
      - "valo-tui-ssh:/etc/valo-tui"
    depends_on: [worker]
    restart: unless-stopped

  caddy:
    image: caddy:2
    ports: ["80:80", "443:443"]
    volumes:
      - "./Caddyfile:/etc/caddy/Caddyfile"
      - "caddy-data:/data"
    depends_on: [web]
    restart: unless-stopped

volumes:
  valo-tui-data:
  valo-tui-ssh:
  caddy-data:

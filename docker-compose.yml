services:
  worker:
    build: .
    command: python worker/fetcher.py
    environment:
      VALTUI_DB: /var/lib/valtui/cache.db
    volumes: ["valtui-data:/var/lib/valtui"]
    restart: unless-stopped

  web:
    build: .
    command: python serve/web.py
    environment:
      VALTUI_DB: /var/lib/valtui/cache.db
    expose: ["8000"]
    volumes: ["valtui-data:/var/lib/valtui"]
    depends_on: [worker]
    restart: unless-stopped

  ssh:
    build: .
    command: python serve/ssh.py
    environment:
      VALTUI_DB: /var/lib/valtui/cache.db
    ports: ["2222:2222"]
    volumes:
      - "valtui-data:/var/lib/valtui"
      - "valtui-ssh:/etc/valtui"
    depends_on: [worker]
    restart: unless-stopped

  caddy:
    image: caddy:2
    ports: ["80:80", "443:443"]
    volumes:
      - "./Caddyfile:/etc/caddy/Caddyfile"
      - "caddy-data:/data"
    depends_on: [web]
    restart: unless-stopped

volumes:
  valtui-data:
  valtui-ssh:
  caddy-data:
